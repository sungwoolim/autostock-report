name: 📊 Daily AutoStock Report

on:
  schedule:
    # 매일 오전 7시 KST 실행 (UTC 기준 전날 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub Actions 탭에서 수동 실행 가능 (테스트용)
    inputs:
      dry_run:
        description: 'Dry run mode (더미 데이터 사용)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo에 commit/push 권한

    steps:
      # 1. 코드 체크아웃
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python 설치
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 의존성 설치
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. 리포트 생성 실행
      - name: 🚀 Generate AutoStock Report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run --no-sheets
          else
            python main.py --no-sheets
          fi

      # 5. 구글 시트 동기화 스크립트 실행
      - name: 🔄 Sync Data to Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python autostock_gsheet_sync.py

      # 6. 아카이브 보관 (선택사항)
      - name: 📁 Copy archive to public/
        run: |
          mkdir -p public
          TODAY=$(date +%Y%m%d)
          
          # 프론트엔드는 이제 index.html이 고정되어 있으므로 덮어씌우지 않습니다.
          # 이전 리포트의 아카이브용으로만 복사합니다.
          cp output/report_${TODAY}.html public/report_${TODAY}.html
          
          # JSON 데이터도 복사
          cp output/report_${TODAY}.json public/report_${TODAY}.json
          cp output/report_${TODAY}.json public/latest.json
          
          echo "✅ Archive copied successfully"

      # 6. 변경사항 커밋 & 푸시
      - name: 📤 Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot 📊"
          git add public/
          git diff --staged --quiet || git commit -m "📊 Auto Report $(date +'%Y-%m-%d %H:%M KST')"
          git push

      # 7. 완료 알림 (선택)
      - name: ✅ Report generation complete
        run: |
          echo "======================================"
          echo "🎉 AutoStock Report 생성 완료!"
          echo "📅 날짜: $(date +'%Y-%m-%d')"
          echo "🌐 URL: https://autostock-report.pages.dev"
          echo "======================================"
