<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoStock Report — 준비 중</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #f1f5f9;
  }
  .container { text-align: center; padding: 40px; }
  .logo {
    font-size: 48px; font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .sub { color: #64748b; font-size: 18px; margin-bottom: 40px; }
  .spinner {
    width: 48px; height: 48px; border: 4px solid #1e293b;
    border-top: 4px solid #6366f1; border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { color: #94a3b8; font-size: 15px; line-height: 1.8; }
  .badge {
    display: inline-block; background: #1e293b; border: 1px solid #334155;
    border-radius: 20px; padding: 8px 20px; margin-top: 32px;
    color: #64748b; font-size: 13px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">AutoStock Report</div>
  <div class="sub">M7 빅테크 AI 투자 분석 시스템</div>
  <div class="spinner"></div>
  <div class="msg">
    첫 번째 리포트를 생성하고 있습니다.<br>
    GitHub Actions가 완료되면 이 페이지가 자동으로 업데이트됩니다.
  </div>
  <div class="badge">⏰ 매일 오전 7시 KST 자동 업데이트</div>
</div>
</body>
</html>
